---
- name: Register the GitHub Actions runner with a GitHub App
  hosts: macvm
  gather_facts: false
  tasks:
    - name: Request a short-lived runner registration token on the host
      ansible.builtin.shell: |
        set -euo pipefail
        base64url() { openssl base64 -A | tr '+/' '-_' | tr -d '='; }
        now="$(date +%s)"
        header="$(printf '%s' '{"alg":"RS256","typ":"JWT"}' | base64url)"
        payload="$(printf '{"iat":%s,"exp":%s,"iss":"%s"}' "$((now - 60))" "$((now + 540))" "$GITHUB_APP_ID" | base64url)"
        key_file="$(mktemp)"
        trap 'rm -f "$key_file"' EXIT
        printf '%s' "$GITHUB_APP_PRIVATE_KEY" > "$key_file"
        signature="$(printf '%s' "$header.$payload" | openssl dgst -sha256 -sign "$key_file" | base64url)"
        jwt="$header.$payload.$signature"
        installation_token="$(curl -fsSL -X POST \
          -H 'Accept: application/vnd.github+json' \
          -H "Authorization: Bearer $jwt" \
          -H 'X-GitHub-Api-Version: 2022-11-28' \
          "https://api.github.com/app/installations/$GITHUB_INSTALLATION_ID/access_tokens" \
          | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')"
        path="${GITHUB_URL#https://github.com/}"
        if [[ "$GITHUB_SCOPE" == "organization" ]]; then
          endpoint="https://api.github.com/orgs/${path%%/*}/actions/runners/registration-token"
        else
          endpoint="https://api.github.com/repos/$path/actions/runners/registration-token"
        fi
        curl -fsSL -X POST \
          -H 'Accept: application/vnd.github+json' \
          -H "Authorization: Bearer $installation_token" \
          -H 'X-GitHub-Api-Version: 2022-11-28' \
          "$endpoint" | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])'
      args:
        executable: /bin/bash
      environment:
        GITHUB_APP_ID: "{{ macvm_inputs.appID }}"
        GITHUB_INSTALLATION_ID: "{{ macvm_inputs.installationID }}"
        GITHUB_APP_PRIVATE_KEY: "{{ macvm_inputs.privateKey }}"
        GITHUB_SCOPE: "{{ macvm_inputs.scope }}"
        GITHUB_URL: "{{ macvm_inputs.githubURL }}"
      delegate_to: localhost
      register: registration
      no_log: true
      changed_when: false

    - name: Configure and start the runner service
      ansible.builtin.raw: |
        set -e
        cd "$HOME/actions-runner"
        if [[ -f .runner ]]; then exit 0; fi
        ephemeral=""
        if [[ "{{ macvm_inputs.ephemeral | default(false) | bool | ternary('true', 'false') }}" == "true" ]]; then ephemeral="--ephemeral"; fi
        name="{{ macvm_inputs.runnerName | default(macvm_context.vm_name, true) }}"
        ./config.sh --unattended \
          --url {{ macvm_inputs.githubURL | quote }} \
          --token {{ registration.stdout | quote }} \
          --name "$name" \
          --labels {{ macvm_inputs.labels | default('macvm,apple-silicon') | quote }} \
          $ephemeral
        sudo ./svc.sh install
        sudo ./svc.sh start
      no_log: true
      changed_when: false
