---
- name: Configure Apple development tools
  hosts: macvm
  gather_facts: false
  tasks:
    - name: Ensure Xcode is selected, then verify
      ansible.builtin.raw: |
        set -e
        if ! xcodebuild -version >/dev/null 2>&1; then
          developer_dir=/Applications/Xcode.app/Contents/Developer
          if [[ ! -d "$developer_dir" ]]; then
            xcode_app="$(find /Applications -maxdepth 1 -name 'Xcode*.app' 2>/dev/null | sort -V | tail -n 1)"
            developer_dir="$xcode_app/Contents/Developer"
          fi
          if [[ -d "$developer_dir" ]]; then
            sudo /usr/bin/xcode-select --switch "$developer_dir"
          fi
        fi
        xcode-select -p && xcodebuild -version
      changed_when: false

    - name: Install Swift development utilities
      ansible.builtin.raw: |
        set -e
        eval "$(/opt/homebrew/bin/brew shellenv)"
        brew install xcbeautify swiftformat swiftlint
      changed_when: false
