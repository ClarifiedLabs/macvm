---
- name: Install Homebrew
  hosts: macvm
  gather_facts: false
  tasks:
    - name: Install Homebrew when absent
      ansible.builtin.raw: |
        set -e
        xcode_dir_before="$(xcode-select -p 2>/dev/null || true)"
        if [[ ! -x /opt/homebrew/bin/brew ]]; then
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
        fi
        # The Homebrew installer switches the active developer directory to the
        # Command Line Tools when it installs them; restore the prior selection.
        xcode_dir_after="$(xcode-select -p 2>/dev/null || true)"
        if [[ -n "$xcode_dir_before" && "$xcode_dir_before" != "$xcode_dir_after" && -d "$xcode_dir_before" ]]; then
          sudo /usr/bin/xcode-select --switch "$xcode_dir_before"
        fi
      changed_when: false

    - name: Configure Homebrew for zsh login shells
      ansible.builtin.raw: |
        set -e
        line='eval "$(/opt/homebrew/bin/brew shellenv)"'
        touch "$HOME/.zprofile"
        grep -Fqx "$line" "$HOME/.zprofile" || printf '\n%s\n' "$line" >> "$HOME/.zprofile"
        eval "$(/opt/homebrew/bin/brew shellenv)"
        brew update
      changed_when: false
